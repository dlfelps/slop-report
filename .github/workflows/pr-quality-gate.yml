name: Slop Report

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  slop-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Slop Report
        uses: ./
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          coverage-threshold: '80'
          performance-threshold: '20'
